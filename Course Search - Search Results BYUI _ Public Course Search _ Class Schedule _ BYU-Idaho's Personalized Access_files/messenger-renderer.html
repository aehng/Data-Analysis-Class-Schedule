.rdp-button:hover:not([disabled]) {

}

.rdp-multiple_months .rdp-caption_start .rdp-nav {

  left: 0;

}

  top: 50%;
  right: 0;
  transform: translateY(-50%);
}

.rdp-nav_button {

  display: inline-flex;
